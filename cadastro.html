<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Esperança Digital</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/responsivo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="assets/favicon.ico">
</head>
<body>
    <header>
        <nav class="menu">
            <div class="logo">
                <img src="imagens/logo.png" alt="Esperança Digital" width="50">
                <span>Esperança Digital</span>
            </div>
            <ul class="menu-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="tecnologias.html">IA</a></li>
                <li><a href="equipe.html">Equipe</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="login.html"><i class="fas fa-user"></i> Login</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <main class="login-cadastro">
        <div class="form-box">
            <h2>Cadastro</h2>
            <form id="formCadastro">
                <div class="form-group">
                    <label for="nomeCad">Nome completo</label>
                    <input type="text" id="nomeCad" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="emailCad">E-mail</label>
                    <input type="email" id="emailCad" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="senhaCad">Senha</label>
                    <input type="password" id="senhaCad" placeholder="********" required>
                </div>
                <div class="form-group">
                    <label for="senhaConf">Confirmar senha</label>
                    <input type="password" id="senhaConf" placeholder="********" required>
                </div>
                <button type="submit" class="btn">Criar conta</button>
                <p>Já tem conta? <a href="login.html">Faça login</a></p>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Esperança Digital. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/menu.js"></script>
    <script src="js/validacao.js"></script>
</body>
</html>
