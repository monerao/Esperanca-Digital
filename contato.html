<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Esperança Digital</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/responsivo.css">
    <link rel="stylesheet" href="css/animacoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="assets/favicon.ico">
</head>
<body>
    <header>
        <!-- menu igual -->
        <nav class="menu">
            <div class="logo">
                <img src="imagens/logo.png" alt="Esperança Digital" width="50">
                <span>Esperança Digital</span>
            </div>
            <ul class="menu-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="tecnologias.html">IA</a></li>
                <li><a href="equipe.html">Equipe</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contato.html" class="ativo">Contato</a></li>
                <li><a href="login.html"><i class="fas fa-user"></i> Login</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>Contato</h1>
            <p>Envie sua mensagem, dúvida ou sugestão.</p>
        </section>

        <section class="contato-form">
            <div class="container">
                <form id="formContato">
                    <div class="form-group">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="assunto">Assunto</label>
                        <input type="text" id="assunto" placeholder="Assunto">
                    </div>
                    <div class="form-group">
                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem..." required></textarea>
                    </div>
                    <button type="submit" class="btn">Enviar <i class="fas fa-paper-plane"></i></button>
                </form>
                <div class="info-contato">
                    <h3>Outros canais</h3>
                    <p><i class="fas fa-phone"></i> (11) 99999-9999</p>
                    <p><i class="fas fa-envelope"></i> contato@esperancadigital.org</p>
                    <p><i class="fas fa-map-marker-alt"></i> São Paulo - SP, Brasil</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Esperança Digital. Todos os direitos reservados.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/menu.js"></script>
    <script src="js/validacao.js"></script>
</body>
</html>
